version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: antcart-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: AKProductsDb

  ak-products-api:
    image: ak-products-api
    build:
      context: .
      dockerfile: AK.Products/AK.Products.API/Dockerfile
    container_name: ak-products-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017
      - MongoDbSettings__DatabaseName=AKProductsDb
      - MongoDbSettings__ProductsCollection=Products
    depends_on:
      - mongodb

  ak-discount-grpc:
    image: ak-discount-grpc
    build:
      context: .
      dockerfile: AK.Discount/AK.Discount.Grpc/Dockerfile
    container_name: ak-discount-grpc
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DiscountDb=Data Source=/app/data/discount.db
    volumes:
      - discount_data:/app/data
    depends_on:
      - mongodb

  redis:
    image: redis:7-alpine
    container_name: antcart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  ak-shoppingcart-api:
    image: ak-shoppingcart-api
    build:
      context: .
      dockerfile: AK.ShoppingCart/AK.ShoppingCart.API/Dockerfile
    container_name: ak-shoppingcart-api
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      RedisSettings__ConnectionString: "redis:6379"
      RedisSettings__InstanceName: "AKCart:"
      RedisSettings__CartExpiryDays: "30"
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: antcart-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: AKOrdersDb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ak-order-api:
    image: ak-order-api
    build:
      context: .
      dockerfile: AK.Order/AK.Order.API/Dockerfile
    container_name: ak-order-api
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=AKOrdersDb;Username=postgres;Password=postgres"
    depends_on:
      - postgres

volumes:
  mongodb_data:
  discount_data:
  postgres_data:
